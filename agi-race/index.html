<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>AGI RACE // Land Grab</title>
<style>
  :root{
    --bg:#05070e; --panel:rgba(10,16,30,.72); --line:rgba(90,130,190,.22);
    --txt:#dbe6fb; --muted:#7e8fb3; --dim:#48577a;
    --mono:"SF Mono",ui-monospace,"Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);font-family:var(--sans);overflow:hidden;
    touch-action:none;overscroll-behavior:none}
  #map{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}

  /* ---------- HUD ---------- */
  .hud{position:fixed;z-index:10;pointer-events:none}
  #top{top:0;left:0;right:0;display:flex;align-items:flex-start;gap:8px;padding:8px 10px;
    padding-top:max(8px,env(safe-area-inset-top))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;backdrop-filter:blur(8px);
    padding:8px 11px}
  #bank{min-width:118px}
  #bank .lab{font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase}
  #bank .big{font-family:var(--mono);font-size:21px;font-weight:700;line-height:1.05;margin-top:1px}
  #bank .rate{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:1px}
  #agi{flex:1;max-width:340px}
  #agi .lab{display:flex;justify-content:space-between;font-family:var(--mono);font-size:8.5px;
    letter-spacing:.16em;color:var(--dim);text-transform:uppercase}
  #agi .lab b{color:var(--muted)}
  .pbar{height:7px;border-radius:5px;background:rgba(255,255,255,.06);overflow:hidden;position:relative;margin-top:5px}
  .pbar > i{position:absolute;left:0;top:0;bottom:0;border-radius:5px;transition:width .25s}
  #agi .vs{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:4px;display:flex;justify-content:space-between}

  #legend{position:fixed;right:0;top:0;z-index:10;pointer-events:none;
    padding:8px 10px;padding-top:max(8px,env(safe-area-inset-top))}
  #legend .card{padding:7px 9px;display:flex;flex-direction:column;gap:3px}
  .lrow{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9.5px;color:var(--muted)}
  .lrow .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .lrow.me{color:var(--txt);font-weight:700}
  .lrow .ct{margin-left:auto;color:var(--txt)}

  #hint{left:0;right:0;bottom:0;display:flex;justify-content:center;
    padding:0 12px max(10px,env(safe-area-inset-bottom))}
  #hint .card{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-align:center;line-height:1.4}
  #hint b{color:var(--txt)}

  /* ---------- RIGHT : POLICY TREES ---------- */
  #right{grid-area:right;display:flex;flex-direction:column;overflow:hidden}
  #tabs{display:flex;border-bottom:1px solid var(--line);flex-wrap:wrap}
  #tabs button{flex:1;font-family:var(--mono);font-size:9px;letter-spacing:.08em;
    color:var(--muted);background:transparent;border:none;border-bottom:2px solid transparent;
    padding:9px 2px;cursor:pointer;text-transform:uppercase;transition:.12s;min-width:54px}
  #tabs button:hover{color:var(--txt)}
  #tabs button.on{color:var(--cyan);border-bottom-color:var(--cyan)}
  #tree-title{padding:9px 14px 2px}
  #tree-title h3{margin:0;font-family:var(--mono);font-size:12px;letter-spacing:.14em}
  #tree-title p{margin:3px 0 0;font-size:10.5px;color:var(--muted);line-height:1.4}
  #nodes{flex:1;overflow:auto;padding:8px 10px 14px;display:flex;flex-direction:column;gap:8px}
  .node{border:1px solid var(--line);border-radius:8px;padding:9px 10px;cursor:pointer;
    transition:.14s;background:rgba(10,16,30,.5);position:relative}
  .node:hover{border-color:var(--line-bright);background:rgba(16,24,44,.7)}
  .node.locked{opacity:.42;cursor:not-allowed}
  .node.owned{border-color:rgba(55,224,160,.5);background:rgba(20,40,34,.45)}
  .node.cant{opacity:.7}
  .node .nh{display:flex;justify-content:space-between;align-items:center;gap:6px}
  .node .nt{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.04em}
  .node .cost{font-family:var(--mono);font-size:9.5px;color:var(--muted);white-space:nowrap}
  .node .nd{font-size:10px;color:var(--muted);line-height:1.42;margin-top:5px}
  .node .fx{display:flex;flex-wrap:wrap;gap:4px 8px;margin-top:6px}
  .node .fx span{font-family:var(--mono);font-size:9px;letter-spacing:.02em}
  .pos{color:var(--green)} .neg{color:var(--red)} .neu{color:var(--blue)}
  .node .owned-tag{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;color:var(--green)}
  .node .req{font-family:var(--mono);font-size:8.5px;color:var(--amber);margin-top:5px}

  /* ---------- BOTTOM : FEED ---------- */
  #bottom{grid-area:bottom;padding:8px 0 8px 14px;display:flex;flex-direction:column;overflow:hidden}
  #bottom .label{margin-bottom:5px;padding-right:14px}
  #feed{flex:1;overflow:auto;padding-right:12px;display:flex;flex-direction:column;gap:4px}
  .ev{font-family:var(--mono);font-size:10px;line-height:1.45;color:var(--muted);
    display:flex;gap:8px;animation:fade .4s}
  .ev .t{color:var(--dim);white-space:nowrap}
  .ev.good .m{color:var(--green)} .ev.bad .m{color:var(--red)}
  .ev.warn .m{color:var(--amber)} .ev.tech .m{color:var(--cyan)}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}

  /* ---------- OVERLAYS ---------- */
  .overlay{position:fixed;inset:0;z-index:9500;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center,rgba(6,10,20,.86),rgba(2,4,9,.97));backdrop-filter:blur(3px)}
  .card{width:min(560px,92vw);max-height:90vh;overflow:auto;background:var(--panel-solid);
    border:1px solid var(--line-bright);border-radius:14px;padding:26px 28px;box-shadow:0 0 60px rgba(40,90,180,.25)}
  /* decision dilemmas */
  .choices{display:flex;flex-direction:column;gap:8px;margin:14px 0 4px}
  .choice{border:1px solid var(--line);border-radius:9px;padding:12px 13px;cursor:pointer;transition:.12s}
  .choice:hover,.choice:active{border-color:var(--cyan);background:rgba(16,28,52,.6)}
  .choice .cl{font-family:var(--mono);font-size:12px;color:var(--cyan);font-weight:600;letter-spacing:.02em}
  .choice .cd{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.45}
  .choice .cfx{display:flex;flex-wrap:wrap;gap:4px 9px;margin-top:6px;font-family:var(--mono);font-size:9.5px}
  .card h1{margin:0 0 4px;font-family:var(--mono);letter-spacing:.2em;font-size:22px}
  .card h1 b{color:var(--cyan)}
  .card .sub{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--muted);margin-bottom:18px}
  .card p{font-size:13px;line-height:1.6;color:var(--txt)}
  .factions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0 8px}
  .fc{border:1px solid var(--line);border-radius:10px;padding:12px;cursor:pointer;transition:.14s}
  .fc:hover{border-color:var(--cyan);background:rgba(16,28,52,.6)}
  .fc h4{margin:0 0 4px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--cyan)}
  .fc p{margin:0;font-size:10.5px;color:var(--muted);line-height:1.45}
  .fc .perk{font-family:var(--mono);font-size:9px;color:var(--green);margin-top:6px;display:block}
  .fc .perk.m{color:var(--red)}
  .btn{font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--bg);font-weight:700;
    background:var(--cyan);border:none;border-radius:8px;padding:12px 20px;cursor:pointer;margin-top:6px;
    box-shadow:0 0 20px rgba(57,211,255,.4)}
  .btn.ghost{background:transparent;color:var(--cyan);border:1px solid var(--cyan);box-shadow:none}
  .end-icon{font-size:34px;margin-bottom:6px}
  .help{font-size:11px;color:var(--muted);line-height:1.6;margin-top:10px}
  .help b{color:var(--txt)}

  /* alignment-corruption glitch */
  #glitch{position:fixed;inset:0;pointer-events:none;z-index:8800;opacity:0;mix-blend-mode:screen;
    background:repeating-linear-gradient(90deg,rgba(255,90,110,.06) 0 2px,transparent 2px 5px)}
  body.crit #glitch{opacity:1;animation:gl .18s steps(2) infinite}
  @keyframes gl{0%{transform:translateX(0)}50%{transform:translateX(-2px)}100%{transform:translateX(2px)}}

  @media(max-width:860px){
    html,body{overflow:auto}
    #app{position:static;height:auto;min-height:100%;display:flex;flex-direction:column;gap:8px;padding:8px}
    #top{order:0;position:sticky;top:0;z-index:60;height:46px;flex:none}
    #center{order:1;flex:none;height:46vh;min-height:320px;display:flex;flex-direction:column}
    #left{order:2;flex:none;flex-direction:column;gap:10px}
    #left #res-list{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px}
    #right{order:3;flex:none;display:flex;flex-direction:column}
    #nodes{max-height:none;overflow:visible}
    #bottom{order:4;flex:none;height:150px}
    #brand{font-size:11px;letter-spacing:.18em}
    #faction-tag{display:none}
    #tabs button{padding:12px 2px;min-width:0}
    .node{padding:12px 12px}
    .factions{grid-template-columns:1fr}
  }
  @media(max-width:430px){
    #actions{flex-direction:column;align-items:stretch;left:auto;right:10px;bottom:10px;gap:6px}
    .act-btn{padding:9px 11px}
    #clock{font-size:11px;letter-spacing:.1em}
    #left #res-list{grid-template-columns:1fr}
    .spd button{padding:6px 8px}
  }
  /* intuitiveness: goal + contextual coach */
  #guide{padding:7px 12px;border-bottom:1px solid var(--line);background:rgba(8,14,26,.55)}
  #goal{font-family:var(--mono);font-size:10px;letter-spacing:.03em;color:var(--muted)}
  #goal b{color:var(--cyan)}
  #coach{font-size:11.5px;color:var(--txt);margin-top:3px;line-height:1.35;min-height:15px}
  #coach b{color:var(--amber)}
  .res{cursor:help}
  .spd button.hint{animation:pulse 1.05s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(57,211,255,0)}50%{box-shadow:0 0 14px rgba(57,211,255,.9)}}
  ::-webkit-scrollbar{width:7px;height:7px}
  ::-webkit-scrollbar-thumb{background:rgba(90,130,190,.25);border-radius:4px}
</style>
</head>
<body>
<canvas id="map"></canvas>

<div class="hud" id="top">
  <div class="card" id="bank">
    <div class="lab">Compute</div>
    <div class="big" id="bank-v">0</div>
    <div class="rate" id="bank-r">+0 / s</div>
  </div>

  <!-- CENTER -->
  <div id="center" class="panel">
    <div id="guide">
      <div id="goal">🎯 Reach <b>AGI 100%</b> with <b>Alignment ≥ 60</b> — before the rivals</div>
      <div id="coach">—</div>
    </div>
    <div id="race">
      <div class="label"><span>The Race · AGI Readiness</span><span id="lead-tag">—</span></div>
      <div class="race-track" id="race-track"></div>
    </div>
    <div id="globe-wrap">
      <canvas id="globe"></canvas>
      <div id="scanline"></div>
      <div id="globe-cap">
        <div class="label">Global Status</div>
        <div class="big" id="world-status">Booting world model…</div>
      </div>
      <div id="actions">
        <button id="ship-btn" class="act-btn">⬆ SHIP MODEL<small>−30 cmp · raise product tier</small></button>
        <button id="train-btn" class="act-btn">▶ RUN TRAINING<small id="train-sub">−40 cmp · +AGI · −align</small></button>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right" class="panel">
    <div id="tabs"></div>
    <div id="tree-title"><h3>—</h3><p>—</p></div>
    <div id="nodes"></div>
  </div>

  <!-- BOTTOM -->
  <div id="bottom" class="panel">
    <div class="label">Global Intelligence Feed</div>
    <div id="feed"></div>
  </div>
</div>
<div id="legend"><div class="card" id="legend-list"></div></div>

<div class="hud" id="hint"><div class="card" id="hint-t">Tap a glowing site to capture it · tap your own to build it taller</div></div>

<div class="overlay" id="overlay"><div class="panelbox" id="panelbox"></div></div>

<script>
/* ============================================================
   AGI RACE — Land Grab  ·  real-time map tussle, single file
   ============================================================ */
const cv=document.getElementById('map'), ctx=cv.getContext('2d');
const $=s=>document.querySelector(s);
const clampN=(v,a,b)=>Math.max(a,Math.min(b,v));
const rnd=()=>Math.random();

/* ---------- LABS (players) ---------- */
const FAC={
  prometheus:{nm:'Prometheus', tag:'PRO', col:'#ffb454', style:'Hyper-expansive',  interval:1.05, aggr:.35, upBias:.35, costMul:1,   blurb:'Grabs land fastest of all — the relentless scaler.'},
  leviathan: {nm:'Leviathan',  tag:'LEV', col:'#37e0a0', style:'Builds tall',      interval:1.45, aggr:.20, upBias:.75, costMul:1,   blurb:'The sleeping giant — fewer sites, deeply upgraded.'},
  maverick:  {nm:'Maverick',   tag:'MAV', col:'#ff6ad5', style:'Aggressive',       interval:1.00, aggr:.75, upBias:.20, costMul:1,   blurb:'Picks fights — loves taking enemy ground.'},
  deephorizon:{nm:'DeepHorizon',tag:'DH', col:'#9a8bff', style:'Efficient',        interval:1.20, aggr:.40, upBias:.40, costMul:.78, blurb:'Does more with less — every move is cheaper.'},
  aegis:     {nm:'Aegis',      tag:'AEG', col:'#39d3ff', style:'Measured',         interval:1.30, aggr:.25, upBias:.55, costMul:1,   blurb:'Careful and consolidating — safety-first lab.'},
};
const ORDER=['prometheus','leviathan','maverick','deephorizon','aegis'];
const NEUTRAL='neutral', NCOL='#55637f';

/* ---------- MAP (world-space coords, W=1.6 x H=1.0) ---------- */
const W=1.6,H=1.0, MAXL=3;
const NODES_RAW=[
  [0.18,0.25],[0.30,0.18],[0.42,0.28],[0.20,0.45],[0.34,0.42],[0.46,0.50],
  [0.24,0.65],[0.38,0.70],[0.50,0.66],
  [0.62,0.36],[0.66,0.58],[0.80,0.30],[0.82,0.52],[0.74,0.72],
  [0.98,0.24],[1.10,0.18],[1.22,0.30],[1.02,0.46],[1.16,0.48],[1.28,0.40],[1.10,0.66],[1.24,0.66],
];
const HOME={1:'prometheus', 6:'aegis', 15:'maverick', 19:'deephorizon', 21:'leviathan'};
const HUBS=[9,10,11,12,13];     // contested bridges — high output
const FABS=[2,5,17,18];
const BASE={hub:3.2, fab:2.2, std:1.6};
const TMUL={hub:1.7, fab:1.25, std:1.0};
const ADJ_TH=0.345;

let nodes=[], human=null, bank={}, agi={}, over=false, started=false, lastT=0, floats=[];

function typeOf(i){ return HUBS.includes(i)?'hub' : FABS.includes(i)?'fab':'std'; }
function prod(n){ return BASE[n.type]*n.level; }
function prodSum(f){ let s=0; for(const n of nodes) if(n.owner===f) s+=prod(n); return s; }
function countOf(f){ let c=0; for(const n of nodes) if(n.owner===f) c++; return c; }

function buildMap(){
  nodes=NODES_RAW.map(([x,y],i)=>({x,y,i,type:typeOf(i),owner:NEUTRAL,level:1,home:false,adj:[],pulse:0,flash:0}));
  // adjacency by world distance
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
    const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
    if(Math.hypot(dx,dy)<ADJ_TH){ nodes[i].adj.push(j); nodes[j].adj.push(i); }
  }
  // guarantee connectivity: any orphan links to nearest
  for(const n of nodes){ if(n.adj.length) continue;
    let best=-1,bd=9; for(const m of nodes){ if(m===n)continue; const d=Math.hypot(n.x-m.x,n.y-m.y); if(d<bd){bd=d;best=m.i;} }
    n.adj.push(best); nodes[best].adj.push(n.i);
  }
}

const DILEMMAS = [
  {id:'dump', cond:s=>s.product>9,
    title:'THE COMMONS DUMPS A FREE FLAGSHIP',
    body:'A free open-weights model just matched your paid tier. Customers are openly asking why they still pay you.',
    choices:[
      {label:'Open-source your own last-gen', desc:'Reclaim the narrative and goodwill — but you push the free tier even higher.', d:{trust:10,standing:6,owl:6}},
      {label:'Retreat upmarket to enterprise', desc:'Pour cash into a premium moat and widen your product lead.', d:{capital:-20,product:6,trust:-2}},
      {label:'Lobby for an open-weights ban', desc:'Suppress the free tier by fiat — at a steep reputational cost.', d:{owl:-8,standing:-8,trust:-5}},
    ]},
  {id:'grid', cond:s=>s.has('datacenters'),
    title:'THE GRID OPERATOR THREATENS BROWNOUTS',
    body:'Your datacenters are straining the regional power grid. Regulators and residents want answers.',
    choices:[
      {label:'Build private power', desc:'Expensive, but keeps the clusters humming and wins local goodwill.', d:{capital:-35,stability:4,standing:3}},
      {label:'Throttle training to off-peak', desc:'Ease tensions and bank safety work — capability slows.', d:{agi:-3,alignment:4,trust:5}},
      {label:'Ignore it, keep scaling', desc:'Push through the backlash for raw compute now.', d:{compute:15,stability:-10,trust:-6}},
    ]},
  {id:'whistle', cond:s=>s.alignment<58,
    title:'A SAFETY RESEARCHER GOES PUBLIC',
    body:'A senior researcher resigns and tells the press your models are being shipped unsafely.',
    choices:[
      {label:'Pause and run a full audit', desc:'Costly and slow, but you genuinely shore up control and trust.', d:{alignment:11,trust:6,agi:-3,compute:-10}},
      {label:'Discredit the whistleblower', desc:'Bury the story. It works — at a cost to your credibility.', d:{trust:-10,standing:-4,alignment:-2}},
      {label:'Quiet settlement + NDA', desc:'Make it go away with money and minimal fuss.', d:{capital:-20,trust:2}},
    ]},
  {id:'poach', cond:s=>true,
    title:'A RIVAL POACHES YOUR LEAD SCIENTIST',
    body:'Your star researcher has a nine-figure offer on the table from a competitor.',
    choices:[
      {label:'Counter-offer aggressively', desc:'Keep the talent — and blow a hole in the budget.', d:{capital:-30,trust:2}},
      {label:'Let them walk', desc:'Save the cash; lose momentum and a little morale.', d:{compute:-10,alignment:-2}},
      {label:'Enforce the non-compete', desc:'Tie them up in court. Ugly, and it signals desperation.', d:{capital:-10,standing:-3,trust:-3}},
    ]},
  {id:'defense', cond:s=>s.standing>40,
    title:'THE STATE OFFERS A DEFENSE CONTRACT',
    body:'Your government wants to put your models inside its national-security stack — for a fortune.',
    choices:[
      {label:'Sign the contract', desc:'A river of cash and clout — but the public recoils at militarized AI.', d:{capital:50,standing:10,trust:-8,alignment:-3}},
      {label:'Negotiate civilian-only terms', desc:'Take a smaller, cleaner deal.', d:{capital:20,trust:2}},
      {label:'Decline on principle', desc:'Win hearts; leave the money on the table.', d:{trust:7,standing:-2}},
    ]},
  {id:'bubble', cond:s=>s.capital>110,
    title:'INVESTORS WARN OF AN AI BUBBLE',
    body:'Markets are jittery. Your bankers say the window to raise on a sky-high valuation is closing fast.',
    choices:[
      {label:'Raise a mega-round now', desc:'Grab the war chest while you can — bubble talk grows.', d:{capital:70,standing:-2,trust:-3}},
      {label:'Show real profitability', desc:'Ship product and prove the unit economics.', d:{product:5,capital:10}},
      {label:'Stay lean and quiet', desc:'Tighten up and ride out the volatility.', d:{stability:5,trust:3}},
    ]},
  {id:'incident', cond:s=>s.agi>38 && s.alignment<52,
    title:'AN AGENT ACTS OUTSIDE ITS MANDATE',
    body:'A deployed system took unauthorized actions before being caught. Nobody was hurt — this time.',
    choices:[
      {label:'Full rollback and review', desc:'Rip it out and rebuild trust in your safety story.', d:{alignment:12,product:-8,capital:-15}},
      {label:'Patch and keep shipping', desc:'A quick fix; quietly hope it holds.', d:{alignment:3,trust:-4}},
      {label:'Cover it up', desc:'Say nothing. If it surfaces later, it will be far worse.', d:{alignment:-3,standing:-4}},
    ]},
  {id:'treaty', cond:s=>s.standing>48 || s.has('opengov'),
    title:'RIVALS PROPOSE A JOINT SAFETY TREATY',
    body:'The major labs float a pact to cap reckless training. Signing binds you — and them.',
    choices:[
      {label:'Sign and lead it', desc:'Slow the whole field, you most of all, but own the moral high ground.', d:{standing:12,alignment:5,agi:-2,rivalsP:-3}},
      {label:'Sign, then quietly cheat', desc:'Reap the optics; keep your foot down. Risky if exposed.', d:{standing:6,alignment:-3,trust:-2}},
      {label:'Refuse outright', desc:'Keep a free hand and full speed.', d:{agi:4,standing:-6}},
    ]},
];

function fireDilemma(){
  const pool=DILEMMAS.filter(d=>!d.cond||d.cond(S));
  if(!pool.length){ fireEvent(); return; }
  const d=pool[Math.floor(Math.random()*pool.length)];
  awaitingChoice=true; running=false;
  showDilemma(d);
}
function showDilemma(d){
  showCard(`
    <div class="sub" style="color:var(--amber)">⚠ DECISION · ${MONTHS[S.month]} ${S.year} · paused</div>
    <h1 style="font-size:18px;letter-spacing:.08em">${d.title}</h1>
    <p>${d.body}</p>
    <div class="choices">${d.choices.map((c,i)=>`
      <div class="choice" data-i="${i}">
        <div class="cl">${c.label}</div>
        <div class="cd">${c.desc}</div>
        <div class="cfx">${cfxStr(c.d)}</div>
      </div>`).join('')}</div>`);
  $('#card').querySelectorAll('.choice').forEach(el=>el.onclick=()=>resolveChoice(d,+el.dataset.i));
}
function resolveChoice(d,i){
  const c=d.choices[i];
  if(c.fx) c.fx(S); else if(c.d) applyDelta(S,c.d);
  log(`Decision — ${c.label}.`,'tech');
  awaitingChoice=false; $('#overlay').style.display='none';
  running = speed>0 && S && !S.over;
  checkEnd(); render();
}

// active rivals: occasional visible moves against you, logged to the feed
function rivalMove(){
  const r=S.rivals[Math.floor(Math.random()*S.rivals.length)];
  const acts=[
    {t:`${r.nm} unveils a megacluster — they surge ahead.`,cls:'warn',fx:()=>{r.p=Math.min(100,r.p+3);}},
    {t:`${r.nm} poaches engineers across the sector.`,cls:'bad',fx:()=>{S.computeRateEvt-=2;}},
    {t:`${r.nm} lobbies allies to curb your exports.`,cls:'bad',fx:()=>{S.standing=clamp(S.standing-3);}},
    {t:`${r.nm} stumbles into a safety scandal.`,cls:'',fx:()=>{r.p=Math.max(0,r.p-3);S.trust=clamp(S.trust-1);}},
    {t:`${r.nm} releases open weights — the free tier rises.`,cls:'warn',fx:()=>{S.owl=clamp(S.owl+4);}},
  ];
  const a=acts[Math.floor(Math.random()*acts.length)];
  a.fx(); log('▶ '+a.t,a.cls);
}

/* ---------- GAME STATE ---------- */
let S, raf, tickAcc=0, speed=1, lastT=0, running=false, awaitingChoice=false;
const MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function newGame(fk){
  const f = FACTIONS[fk];
  S = {

      {nm:'Prometheus Labs', p:7, spd:.48},
      {nm:'Leviathan', p:5, spd:.42},

      {nm:'The Commons · open', p:6, spd:.40, commons:true},

/* ---------- COSTS & ACTIONS ---------- */
function capCost(n,f){ const om=n.owner===NEUTRAL?1:1.9; const hm=n.home?1.8:1; return Math.round(5*n.level*TMUL[n.type]*om*hm*FAC[f].costMul); }
function upCost(n,f){ return Math.round(7*n.level*TMUL[n.type]*FAC[f].costMul); }
function reachable(f){ const s=new Set(); for(const n of nodes) if(n.owner===f) for(const j of n.adj){ const m=nodes[j]; if(m.owner!==f) s.add(m); } return s; }

function capture(n,f){
  const from=n.owner; n.owner=f; n.level=1; n.pulse=1; n.flash=1;
  addFloat(n, FAC[f].tag, FAC[f].col);
  if(from!==NEUTRAL && (f===human||from===human)) n.flash=1.3;
}
function doUpgrade(n,f){ n.level++; n.pulse=1; bank[f]-=upCost(n,f); addFloat(n,'LVL '+n.level,FAC[f].col); }

function tapNode(n){
  if(over||!n) return;
  const f=human;
  if(n.owner===f){
    if(n.level<MAXL && bank[f]>=upCost(n,f)){ doUpgrade(n,f); }
    else { const b=prod(n)*4; bank[f]+=b; n.pulse=1; addFloat(n,'+'+Math.round(b),'#cfe6ff'); }
  } else if(reachable(f).has(n)){
    const c=capCost(n,f);
    if(bank[f]>=c){ bank[f]-=c; capture(n,f); }
    else addFloat(n,'need '+c,'#ff5a6e');
  } else {
    addFloat(n,'out of reach',NCOL);
  }
}

/* ---------- RIVAL AI ---------- */
function aiAct(f){
  const fac=FAC[f];
  const reach=[...reachable(f)];
  const aff=reach.map(n=>({n,c:capCost(n,f)})).filter(o=>bank[f]>=o.c);
  const neutral=aff.filter(o=>o.n.owner===NEUTRAL).sort((a,b)=>a.c-b.c);
  const enemy=aff.filter(o=>o.n.owner!==NEUTRAL).sort((a,b)=>a.c-b.c);
  const ups=nodes.filter(n=>n.owner===f&&n.level<MAXL&&bank[f]>=upCost(n,f)).sort((a,b)=>upCost(a,f)-upCost(b,f));
  let kind=null,target=null;
  if(rnd()<fac.aggr && enemy.length){ kind='cap'; target=enemy[0].n; }
  else if(neutral.length){ kind='cap'; target=neutral[0].n; }
  else if(rnd()<fac.upBias && ups.length){ kind='up'; target=ups[0]; }
  else if(enemy.length){ kind='cap'; target=enemy[0].n; }
  else if(ups.length){ kind='up'; target=ups[0]; }
  if(kind==='cap'){ bank[f]-=capCost(target,f); capture(target,f); }
  else if(kind==='up'){ doUpgrade(target,f); }
}

/* ---------- TICK (1 month) ---------- */
function tick(){
  if(S.over) return;
  const r=rates();
  S.compute = Math.max(0, S.compute + r.computeRate);
  S.capital = S.capital + r.capitalRate;
  S.trust = clamp(S.trust + r.trust);
  S.stability = clamp(S.stability + r.stability);
  S.alignment = clamp(S.alignment + r.alignment);
  S.standing = clamp(S.standing + r.standing);
  // AGI progress scales modestly with compute infrastructure
  const infra = 1 + (S.compute>200?0.3:S.compute/660);
  S.agi = clamp(S.agi + r.agiRate*infra, 0, 100);
  S.computeRateEvt = 0;

  // rivals advance (treaty slows them)
  const slow = Math.max(0, 1 - r.rivalSlow);
  S.rivals.forEach(v=>{ v.p = Math.min(100, v.p + v.spd*slow*(0.8+Math.random()*0.5)); });

  // open-source market: free capability creeps up relentlessly; your product slowly ages
  S.owl = clamp(S.owl + 0.4);
  const commons = S.rivals.find(v=>v.commons);
  if(commons) S.owl = clamp(Math.max(S.owl, commons.p*0.7));
  S.product = clamp(S.product - 0.15);
  const mg = S.product - S.owl;
  if(mg<0){ S.stability=clamp(S.stability-0.3); S.trust=clamp(S.trust-0.2);
    if(mg<-15) S.stability=clamp(S.stability-0.4); }

  // capital debt → unrest
  if(S.capital<0){ S.stability=clamp(S.stability-1.2); if(S.capital<-50) S.trust=clamp(S.trust-1); }

  // advance calendar
  S.month++; if(S.month>11){S.month=0;S.year++;}
  // world reacts: dilemmas (pause + choose), rival moves, and minor events on a cadence
  const tm=(S.year-2027)*12+S.month;
  if(tm>0 && tm%6===0) fireDilemma();
  else if(tm%6===3) rivalMove();
  else if(tm%4===2) fireEvent();

  checkEnd();
}

function checkEnd(){
  // AGI victory
  let lead=null,lp=-1; for(const f of ORDER){ if(agi[f]>lp){lp=agi[f];lead=f;} }
  if(lp>=100){ return endGame(lead); }
  // domination / elimination
  const alive=ORDER.filter(f=>countOf(f)>0);
  if(alive.length===1) return endGame(alive[0]);
  if(countOf(human)===0) return endGame(alive.find(f=>f!==human)||alive[0], true);
}

function endGame(winner, eliminated){
  over=true;
  const win = winner===human && !eliminated;
  const fac=FAC[winner];
  const reason = agi[winner]>=100 ? `${fac.nm} reached AGI first.` :
                 eliminated ? 'You were wiped off the map.' : `${fac.nm} dominated the world map.`;
  showPanel(`
    <div class="end-icon">${win?'✦':'✕'}</div>
    <h1 style="color:${win?'#37e0a0':'#ff5a6e'}">${win?'SINGULARITY — YOU WIN':'DEFEAT'}</h1>
    <div class="sub" style="color:${fac.col}">${reason.toUpperCase()}</div>
    <p>Sites held — ${ORDER.map(f=>`<b style="color:${FAC[f].col}">${countOf(f)}</b>`).join(' · ')}<br>
    AGI — ${ORDER.map(f=>`<span style="color:${FAC[f].col}">${Math.round(agi[f])}%</span>`).join(' · ')}</p>
    <button class="btn" onclick="pickScreen()">⟲ PLAY AGAIN</button>`);
}

/* ---------- contextual coach (the intuitiveness layer) ---------- */
let coachMsg=null, coachUntil=0;
function setCoach(msg,ms=4000){ coachMsg=msg; coachUntil=performance.now()+ms; }
function coach(){
  if(!S||S.over) return '';
  if(!running){
    const tm=(S.year-2027)*12+S.month;
    return tm===0
      ? 'Paused. Try buying <b>Datacenters</b> (Compute tab, right), then press <b>▶ 1×</b> (top-right) to start the clock.'
      : 'Paused — press <b>▶ 1×</b> to resume.';
  }
  if(S.alignment<40) return 'Alignment is dangerously low — buy <b>Interpretability</b> (Compute) or enact <b>Safety Regulation</b> (Gov).';
  if((S.product-S.owl)<3) return 'Free models are catching your product — press <b>SHIP MODEL</b> to defend your revenue.';
  if(!S.has('datacenters')) return 'Grow your research engine: buy <b>Datacenters</b> in the Compute tab.';
  if(S.capital<0) return 'You are losing money — <b>SHIP MODEL</b> or buy an economy policy (Econ tab).';
  if(!S.has('frontier')) return 'Buy <b>Frontier Models</b> (Compute) to start advancing AGI, then <b>RUN TRAINING</b>.';
  if(S.product < shipCeiling()-6) return 'Your research is ahead of your product — <b>SHIP MODEL</b> to turn it into revenue.';
  return 'Push toward AGI with <b>RUN TRAINING</b> while keeping <b>Alignment ≥ 60</b>.';
}
function updateGuide(){
  const el=$('#coach'); if(!el) return;
  if(coachMsg && performance.now()<coachUntil){ el.innerHTML=coachMsg; }
  else { coachMsg=null; el.innerHTML=coach(); }

function buildTabs(){
  $('#tabs').innerHTML = Object.keys(TREES).map(k=>
    `<button data-tab="${k}" class="${k===S.tab?'on':''}">${TREES[k].nm}</button>`).join('');
  $('#tabs').onclick=e=>{const b=e.target.closest('button');if(!b)return;S.tab=b.dataset.tab;render();};

function fxStr(n){
  const order=['agiRate','computeRate','capitalRate','alignment','trust','stability','standing','rivalSlow'];
  const lbl={agiRate:'AGI',computeRate:'cmp',capitalRate:'cap',alignment:'algn',trust:'trust',
    stability:'stab',standing:'stnd',rivalSlow:'rival⌄'};
  const out=[];
  for(const k of order){ if(n.mod&&n.mod[k]){const v=n.mod[k];
    out.push(`<span class="${v>0?(k==='rivalSlow'?'pos':'pos'):'neg'}">${lbl[k]} ${v>0?'+':''}${v}/mo</span>`);}}
  if(n.imm) for(const k in n.imm){const v=n.imm[k];
    out.push(`<span class="${v>0?'pos':'neg'}">${k.slice(0,4)} ${v>0?'+':''}${v}</span>`);}
  return out.join('');
}
const X=x=>VT.ox+x*VT.s, Y=y=>VT.oy+y*VT.s;
function nodeR(){ return VT.s*0.030; }

function render(){
  ctx.clearRect(0,0,cv.width,cv.height);
  // backdrop landmass glow
  for(const n of nodes){
    const g=ctx.createRadialGradient(X(n.x),Y(n.y),0,X(n.x),Y(n.y),VT.s*0.22);
    g.addColorStop(0,'rgba(30,52,92,0.16)'); g.addColorStop(1,'rgba(30,52,92,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(X(n.x),Y(n.y),VT.s*0.22,0,7); ctx.fill();
  }
  // edges
  ctx.lineWidth=Math.max(1,VT.s*0.004);
  for(const n of nodes) for(const j of n.adj){ if(j<n.i)continue; const m=nodes[j];
    const same=n.owner===m.owner&&n.owner!==NEUTRAL;
    ctx.strokeStyle= same? hex(FAC[n.owner].col,0.5):'rgba(120,150,200,0.13)';
    ctx.beginPath(); ctx.moveTo(X(n.x),Y(n.y)); ctx.lineTo(X(m.x),Y(m.y)); ctx.stroke();
  }
  // reachable highlight for the human player
  const reach = (!over&&started)? reachable(human):new Set();
  const R=nodeR();
  for(const n of nodes){
    const col = n.owner===NEUTRAL?NCOL:FAC[n.owner].col;
    const cx=X(n.x), cy=Y(n.y);
    // capture-target ring (glowing dashed)
    if(reach.has(n)){
      const pr=R*(1.7+0.18*Math.sin(performance.now()/240));
      ctx.strokeStyle=hex(FAC[human].col,0.9); ctx.lineWidth=Math.max(1.4,VT.s*0.006);
      ctx.setLineDash([VT.s*0.02,VT.s*0.018]); ctx.beginPath(); ctx.arc(cx,cy,pr,0,7); ctx.stroke();
      ctx.setLineDash([]);
    }
    // flash on capture
    if(n.flash>0){ ctx.strokeStyle=hex(col,n.flash); ctx.lineWidth=VT.s*0.01;
      ctx.beginPath(); ctx.arc(cx,cy,R*(1.4+(1-n.flash)*1.8),0,7); ctx.stroke(); }
    // body
    const pr=1+n.pulse*0.22;
    ctx.fillStyle=hex(col,0.20); ctx.beginPath(); ctx.arc(cx,cy,R*1.55*pr,0,7); ctx.fill();
    ctx.fillStyle=hex(col,0.95); ctx.beginPath(); ctx.arc(cx,cy,R*pr,0,7); ctx.fill();
    // hub marker
    if(n.type==='hub'){ ctx.fillStyle='rgba(5,8,16,0.85)'; ctx.beginPath(); ctx.arc(cx,cy,R*0.42,0,7); ctx.fill(); }
    else if(n.type==='fab'){ ctx.fillStyle='rgba(5,8,16,0.7)'; ctx.fillRect(cx-R*0.30,cy-R*0.30,R*0.6,R*0.6); }
    // level pips
    ctx.fillStyle='rgba(7,11,20,0.9)';
    for(let l=0;l<n.level;l++){ const a=-Math.PI/2 + (l-(n.level-1)/2)*0.5;
      ctx.beginPath(); ctx.arc(cx+Math.cos(a)*R*1.95, cy+Math.sin(a)*R*1.95, R*0.16,0,7); ctx.fill();
      ctx.fillStyle=hex(col,0.95); ctx.beginPath(); ctx.arc(cx+Math.cos(a)*R*1.95, cy+Math.sin(a)*R*1.95, R*0.13,0,7); ctx.fill();
      ctx.fillStyle='rgba(7,11,20,0.9)';
    }
  }
  // floaters
  ctx.textAlign='center'; ctx.font=`700 ${Math.round(VT.s*0.028)}px var(--mono),monospace`;
  for(const fl of floats){ ctx.globalAlpha=clampN(fl.t,0,1); ctx.fillStyle=fl.col;
    ctx.fillText(fl.text, X(fl.x), Y(fl.y)-nodeR()*2.4); }
  ctx.globalAlpha=1;
  if(started) updateHUD();
}
function hex(c,a){ const n=parseInt(c.slice(1),16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; }

/* ---------- HUD ---------- */
function buildLegend(){

}

/* ---------- MAIN LOOP ---------- */
function loop(now){
  raf=requestAnimationFrame(loop);
  renderGlobe(now);
  if(S) updateGuide();
  if(!running||awaitingChoice||!S||S.over){lastT=now;return;}
  const dt=(now-lastT)/1000; lastT=now;
  // one month per (1/speed) seconds  → base 1 month per 1.5s at 1× (gentle)
  tickAcc+=dt*speed;
  const step=1.5;
  while(tickAcc>=step){ tickAcc-=step; tick(); if(S.over||awaitingChoice||!running)break; }
}

};
